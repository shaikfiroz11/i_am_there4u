<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Alarm Controller | Premium Web Trigger</title>
  <meta name="description"
    content="A premium offline-friendly web controller that triggers alarm sounds on your paired Android device using Firebase Realtime Database.">
  <link rel="stylesheet" href="styles.css?v=17">
</head>

<body>
  <canvas id="starryCanvas"></canvas>
  <div class="container">
    <div class="card">
      <!-- Device Availability Badge -->
      <div id="deviceStatus" class="device-status online" style="display: none;">
        <span class="status-dot"></span>
        <span id="deviceStatusText">Listening</span>
      </div>

      <h1>Oyy</h1>
      <p class="subtitle">Ek baar bulavo, Aatum hai mai</p>

      <!-- Connection Status -->
      <div id="statusIndicator" class="status-indicator">
        <span class="status-dot"></span>
        <span id="statusText">Connecting...</span>
      </div>

      <!-- Trigger Area -->
      <div class="trigger-container">
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>

        <button id="triggerBtn" class="trigger-btn" disabled>
          <svg viewBox="0 0 24 24">
            <path
              d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z" />
          </svg>
          <span id="btnText">READY</span>
        </button>
      </div>

      <!-- Local sound listener toggle -->
      <div id="soundToggle" class="sound-toggle-container" style="display: none;" title="Listen locally on web">
        <svg id="soundToggleIcon" viewBox="0 0 24 24">
          <!-- Muted icon by default -->
          <path
            d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
        </svg>
        <span>Listen</span>
      </div>
    </div>

    <!-- Synced Lyrics Section (Outside Card) -->
    <div id="lyricsContainer" class="lyrics-container">
      <div id="lyricsLayout" class="lyrics-layout">
        <!-- Populated dynamically -->
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.9.0/jsrsasign-all-min.js"></script>
  <script type="module" src="app.js?v=17"></script>
</body>

</html>
